server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Redirecionamento de sitemap
    rewrite ^/sitemap\.xml$ /sitemap-index.xml last;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Security Headers template
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Llms-Txt "/llms.txt" always;
    add_header Llms-Full-Txt "/llms-full.txt" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://unpkg.com https://fonts.gstatic.com; worker-src 'self' blob:; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;

    # Clean URLs with trailing slash normalization or fallback
    location / {
        try_files $uri $uri/ $uri.html /index.html =404;
    }

    # Cache control for HTML/XML/JSON
    location ~* \.(?:html|xml|json)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Llms-Txt "/llms.txt" always;
        add_header Llms-Full-Txt "/llms-full.txt" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://unpkg.com https://fonts.gstatic.com; worker-src 'self' blob:; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;
    }

    # Cache control for fingerprinted Astro assets
    location ~* ^/_astro/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Llms-Txt "/llms.txt" always;
        add_header Llms-Full-Txt "/llms-full.txt" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://unpkg.com https://fonts.gstatic.com; worker-src 'self' blob:; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;
    }

    # Cache control for general static assets
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Llms-Txt "/llms.txt" always;
        add_header Llms-Full-Txt "/llms-full.txt" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://unpkg.com https://fonts.gstatic.com; worker-src 'self' blob:; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;
    }

    # Proxy for Uptime Kuma Heartbeat monitoring
    location /api/status-heartbeat {
        proxy_pass https://status.suitplus.com.br/api/status-page/heartbeat/template;
        proxy_ssl_server_name on;
        proxy_set_header Host status.suitplus.com.br;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Type "application/json" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://unpkg.com https://fonts.gstatic.com; worker-src 'self' blob:; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;
    }

    # Proxy for n8n webhook (avoid CORS)
    location /api/submit-form {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        proxy_pass https://n8n.suitplus.com.br/webhook/contato-site;
        proxy_ssl_server_name on;
        proxy_set_header Host n8n.suitplus.com.br;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
